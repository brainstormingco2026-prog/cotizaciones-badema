# Base de datos local para desarrollo. Ejecutar: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_badema
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
